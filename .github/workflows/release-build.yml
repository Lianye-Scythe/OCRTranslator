name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Detect SignPath configuration
        id: signpath_gate
        shell: powershell
        run: |
          $requiredValues = @(
            $env:SIGNPATH_API_TOKEN,
            $env:SIGNPATH_ORGANIZATION_ID,
            $env:SIGNPATH_PROJECT_SLUG,
            $env:SIGNPATH_SIGNING_POLICY_SLUG
          )
          $enabled = $true
          foreach ($value in $requiredValues) {
            if ([string]::IsNullOrWhiteSpace($value)) {
              $enabled = $false
              break
            }
          }
          "enabled=$($enabled.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Build unsigned release package
        shell: cmd
        run: |
          set BUILD_NO_PAUSE=1
          build_exe.bat

      - name: Resolve release archive path
        id: release_archive
        shell: powershell
        run: |
          $zip = Get-ChildItem release\OCRTranslator-v*-windows-x64.zip | Select-Object -First 1
          if (-not $zip) {
            throw "Release ZIP was not produced under release/."
          }
          "path=$($zip.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($zip.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload unsigned files for SignPath
        if: ${{ steps.signpath_gate.outputs.enabled == 'true' }}
        id: upload_unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-windows-package
          if-no-files-found: error
          path: |
            release/OCRTranslator.exe
            release/README.md
            release/config.example.json

      - name: Submit signing request to SignPath
        if: ${{ steps.signpath_gate.outputs.enabled == 'true' }}
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ env.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ env.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: '${{ env.SIGNPATH_PROJECT_SLUG }}'
          signing-policy-slug: '${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}'
          github-artifact-id: '${{ steps.upload_unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'release-signed'

      - name: Repack signed release ZIP
        if: ${{ steps.signpath_gate.outputs.enabled == 'true' }}
        shell: powershell
        run: |
          $signedExe = Join-Path $PWD 'release-signed\OCRTranslator.exe'
          if (-not (Test-Path $signedExe)) {
            throw "Signed executable not found in release-signed/."
          }
          $zipPath = '${{ steps.release_archive.outputs.path }}'
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path @(
            'release-signed\OCRTranslator.exe',
            'release\README.md',
            'release\LICENSE',
            'release\config.example.json'
          ) -DestinationPath $zipPath -Force

      - name: Upload final release ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: OCRTranslator-windows-x64-${{ github.ref_name }}
          if-no-files-found: error
          path: ${{ steps.release_archive.outputs.path }}

      - name: Extract release notes from annotated tag
        if: startsWith(github.ref, 'refs/tags/')
        id: release_notes
        shell: powershell
        run: |
          $notesPath = Join-Path $PWD 'release-notes.md'
          $tagName = $env:GITHUB_REF_NAME
          $notes = (git tag -l --format='%(contents)' $tagName | Out-String).Trim()
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = @(
              $tagName,
              '',
              '- Automated release build.',
              '- Current public Windows package is unsigned.',
              '- Code signing is planned via SignPath / Trusted Build.'
            ) -join "`r`n"
          }
          Set-Content -Path $notesPath -Value $notes -Encoding utf8
          "path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release_archive.outputs.path }}
          body_path: ${{ steps.release_notes.outputs.path }}
